services:
  - type: web
    name: study-group-organizer
    env: node
    buildCommand: npm install && cd client && npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
        # Set this in Render dashboard: mongodb+srv://<user>:<pass>@<cluster>.mongodb.net/studygroup?retryWrites=true&w=majority
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 7d
      - key: CLIENT_URL
        value: https://study-group-organizer.onrender.com
